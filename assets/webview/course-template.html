<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Content</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background-color: #f5f5f5;
        color: #333;
        padding: 16px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .header {
        background: linear-gradient(135deg, #0284c7 0%, #7c3aed 100%);
        color: white;
        padding: 24px;
        text-align: center;
      }

      .header h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }

      .instructor {
        font-size: 14px;
        opacity: 0.9;
      }

      .content {
        padding: 24px;
      }

      .description {
        line-height: 1.6;
        margin-bottom: 24px;
        color: #666;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }

      .info-item {
        background: #f9fafb;
        padding: 16px;
        border-radius: 8px;
        text-align: center;
      }

      .info-label {
        font-size: 12px;
        color: #999;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .info-value {
        font-size: 18px;
        font-weight: 600;
        color: #0284c7;
      }

      .section {
        margin-bottom: 24px;
      }

      .section-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #000;
      }

      .button-group {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }

      button {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #0284c7 0%, #7c3aed 100%);
        color: white;
      }

      .btn-primary:hover {
        opacity: 0.9;
        transform: scale(1.02);
      }

      .btn-secondary {
        background: #e5e7eb;
        color: #333;
      }

      .btn-secondary:hover {
        background: #d1d5db;
      }

      .loading {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }

      .error {
        background: #fee;
        border: 1px solid #fcc;
        color: #c33;
        padding: 16px;
        border-radius: 8px;
        margin-top: 16px;
      }

      @media (max-width: 600px) {
        .info-grid {
          grid-template-columns: 1fr;
        }

        .button-group {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="content">
        <div class="loading">Loading course content...</div>
      </div>
    </div>

    <script>
      function renderCourse(course) {
        const html = `
          <div class="header">
            <h1>${course.title || 'Course Title'}</h1>
            <p class="instructor">${course.instructorName || 'By Instructor'}</p>
          </div>
          <div class="content">
            <p class="description">${course.description || 'Course description'}</p>
            
            <div class="info-grid">
              <div class="info-item">
                <div class="info-label">Duration</div>
                <div class="info-value">${course.duration || '0'} hrs</div>
              </div>
              <div class="info-item">
                <div class="info-label">Students</div>
                <div class="info-value">${course.enrolledCount || '0'}</div>
              </div>
              <div class="info-item">
                <div class="info-label">Rating</div>
                <div class="info-value">${(course.rating || 0).toFixed(1)}★</div>
              </div>
              <div class="info-item">
                <div class="info-label">Level</div>
                <div class="info-value">${course.level || 'Beginner'}</div>
              </div>
            </div>

            <div class="section">
              <div class="section-title">What You'll Learn</div>
              <p>This course will cover fundamentals and advanced topics to help you master the subject.</p>
            </div>

            <div class="button-group">
              <button class="btn-primary" onclick="sendMessage('enroll')">Enroll Now</button>
              <button class="btn-secondary" onclick="sendMessage('bookmark')">Bookmark</button>
            </div>
          </div>
        `;
        document.getElementById('content').innerHTML = html;
      }

      function sendMessage(action) {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify({ action, timestamp: Date.now() }));
        } else {
          console.log('[WebView] Action:', action);
        }
      }

      // Listen for course data injection
      document.addEventListener('DOMContentLoaded', () => {
        if (window.__COURSE__) {
          const course = window.__COURSE__;
          renderCourse({
            title: course.title,
            instructorName: course.instructorName,
            description: course.description,
            duration: course.duration,
            enrolledCount: course.enrolledCount,
            rating: course.rating,
            level: course.level,
          });
        }
      });

      // Fallback for when course data is injected before DOMContentLoaded
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          if (window.__COURSE__) {
            const course = window.__COURSE__;
            renderCourse({
              title: course.title,
              instructorName: course.instructorName,
              description: course.description,
              duration: course.duration,
              enrolledCount: course.enrolledCount,
              rating: course.rating,
              level: course.level,
            });
          }
        });
      } else if (window.__COURSE__) {
        const course = window.__COURSE__;
        renderCourse({
          title: course.title,
          instructorName: course.instructorName,
          description: course.description,
          duration: course.duration,
          enrolledCount: course.enrolledCount,
          rating: course.rating,
          level: course.level,
        });
      }

      // Signal to native that content is ready
      window.dispatchEvent(new Event('course-ready'));
    </script>
  </body>
</html>
